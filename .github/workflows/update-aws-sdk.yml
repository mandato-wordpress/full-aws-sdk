name: Update Full AWS SDK

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # Allow manual triggers

permissions:
  contents: write

jobs:
  check-and-update:
    name: Check for new AWS SDK version
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Fetch latest SDK version from Packagist ────────────────────────
      - name: Get latest AWS SDK for PHP version
        id: latest
        run: |
          LATEST=$(curl -s "https://packagist.org/packages/aws/aws-sdk-php.json" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          versions = list(data['package']['versions'].keys())
          stable = [v for v in versions if not any(x in v.lower() for x in ['alpha','beta','rc','dev','-'])]
          print(stable[0])
          ")
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest AWS SDK for PHP: $LATEST"

      # ── 3. Read the current version from the plugin file ──────────────────
      - name: Get current plugin version
        id: current
        run: |
          CURRENT=$(grep "^define( 'FULL_AWS_SDK_VERSION'" full-aws-sdk.php \
            | sed "s/.*'\([0-9.]*\)'.*/\1/")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current plugin version: $CURRENT"

      # ── 4. Fetch latest WordPress version for "Tested up to" ─────────────
      - name: Get latest WordPress version
        id: wp_version
        run: |
          # Line 3 of the WordPress version-check API contains the latest version
          WP_RAW=$(curl -s "https://api.wordpress.org/core/version-check/1.1/" | sed -n '3p')
          # Strip patch segment: "6.7.1" → "6.7", "6.7" → "6.7"
          WP_VERSION=$(echo "$WP_RAW" | sed 's/^\([0-9]*\.[0-9]*\)\(\.[0-9]*\)*$/\1/')
          echo "version=$WP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest WordPress: $WP_VERSION"

      # ── 5. Read the current "Tested up to" from readme.txt ───────────────
      - name: Get current Tested up to
        id: wp_current
        run: |
          CURRENT=$(grep "^Tested up to:" readme.txt | sed 's/Tested up to:[[:space:]]*//')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current Tested up to: $CURRENT"

      # ── 6. Exit early if nothing changed ──────────────────────────────────
      - name: Compare versions
        if: ${{ github.event_name != 'workflow_dispatch' }}
        id: compare
        run: |
          SDK_CHANGED=false
          WP_CHANGED=false

          if [ "${{ steps.latest.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            SDK_CHANGED=true
            echo "New SDK version detected: ${{ steps.latest.outputs.version }}"
          fi

          if [ "${{ steps.wp_version.outputs.version }}" != "${{ steps.wp_current.outputs.version }}" ]; then
            WP_CHANGED=true
            echo "New WordPress version detected: ${{ steps.wp_version.outputs.version }}"
          fi

          if [ "$SDK_CHANGED" = "true" ] || [ "$WP_CHANGED" = "true" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected – exiting early."
          fi

      # ── 6a. Continue anyway ───────────────────────────────────────────────
      - name: Compare versions 
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: compare-
        run: |
          echo "We are updating manually, continuing..."
          echo "changed=true"  >> "$GITHUB_OUTPUT"
        
      # ── 7. Set up PHP + Composer ──────────────────────────────────────────
      - name: Set up PHP
        if: steps.compare.outputs.changed == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      # ── 8. Fetch the release date for the new version ─────────────────────
      - name: Get release date
        id: release_date
        if: steps.compare.outputs.changed == 'true'
        run: |
          NEW_VERSION="${{ steps.latest.outputs.version }}"
          DATE=$(curl -s "https://packagist.org/packages/aws/aws-sdk-php.json" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          v = '$NEW_VERSION'
          pkg = data['package']['versions'].get(v, {})
          print(pkg.get('time', '')[:10])
          ")
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Release date: $DATE"

      # ── 9. Update composer.json to pin the new version ────────────────────
      - name: Update composer.json
        if: steps.compare.outputs.changed == 'true'
        run: |
          NEW_VERSION="${{ steps.latest.outputs.version }}"
          python3 -c "
          import json
          with open('composer.json') as f:
              data = json.load(f)
          data['require']['aws/aws-sdk-php'] = '$NEW_VERSION'
          with open('composer.json', 'w') as f:
              json.dump(data, f, indent=4)
              f.write('\n')
          "

      # ── 10. Update lock file and install vendor with the new SDK ─────────
      - name: Composer update
        if: steps.compare.outputs.changed == 'true'
        run: composer update aws/aws-sdk-php --no-dev --optimize-autoloader

      # ── 11. Update version constants in the plugin PHP file ───────────────
      - name: Update plugin PHP file
        if: steps.compare.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.latest.outputs.version }}
          RELEASE_DATE: ${{ steps.release_date.outputs.date }}
        run: |
          sed -i \
            "s/^\( \* Version:.*\)$/\ * Version:           $NEW_VERSION/" \
            full-aws-sdk.php
          sed -i \
            "s/^define( 'FULL_AWS_SDK_VERSION'.*$/define( 'FULL_AWS_SDK_VERSION',     '$NEW_VERSION' );/" \
            full-aws-sdk.php
          sed -i \
            "s/^define( 'FULL_AWS_SDK_RELEASE_DATE'.*$/define( 'FULL_AWS_SDK_RELEASE_DATE', '$RELEASE_DATE' );/" \
            full-aws-sdk.php

      # ── 12. Update CHANGELOG.md and readme.txt ────────────────────────────
      - name: Update CHANGELOG.md and readme.txt
        if: steps.compare.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.latest.outputs.version }}
          RELEASE_DATE: ${{ steps.release_date.outputs.date }}
          WP_VERSION: ${{ steps.wp_version.outputs.version }}
        run: |
          sed -i "s/^Stable tag:.*/Stable tag:        $NEW_VERSION/" readme.txt
          sed -i "s/^Tested up to:.*/Tested up to:      $WP_VERSION/" readme.txt

          python3 - <<'PYEOF'
          import os, re

          new_version  = os.environ['NEW_VERSION']
          release_date = os.environ['RELEASE_DATE']
          entry_md     = f"\n## [{new_version}] – {release_date}\n\n- Updated bundled AWS SDK for PHP to {new_version} (released {release_date}).\n"
          entry_wp     = f"= {new_version} =\n* Updated bundled AWS SDK for PHP to {new_version} (released {release_date}).\n"

          # ── CHANGELOG.md: prepend after the first heading ──────────────────
          with open('CHANGELOG.md') as f:
              md = f.read()
          # Insert after the first blank line following the top-level heading
          md = re.sub(
              r'(# Changelog\n.*?\n\n)',
              r'\1' + entry_md.lstrip('\n') + '\n',
              md,
              count=1,
              flags=re.DOTALL,
          )
          with open('CHANGELOG.md', 'w') as f:
              f.write(md)

          # ── readme.txt: keep only the 3 most recent entries ────────────────
          with open('readme.txt') as f:
              txt = f.read()

          # Locate the Changelog section
          changelog_marker = '== Changelog =='
          upgrade_marker   = '== Upgrade Notice =='
          start = txt.index(changelog_marker)
          end   = txt.index(upgrade_marker)

          before   = txt[:start]
          after    = txt[end:]
          cl_block = txt[start:end]

          # Find the link line (first line after the header) and existing entries
          link_match = re.search(r'(For the full history.*?\n)', cl_block)
          link_line  = link_match.group(1) if link_match else ''

          # Collect existing versioned entries  (= X.Y.Z = … )
          entries = re.findall(r'(= [\d.]+ =\n(?:.*\n)*?)(?==|\Z)', cl_block)

          # Prepend new entry and keep only 3 total
          entries.insert(0, entry_wp + '\n')
          entries = entries[:3]

          new_cl  = f'{changelog_marker}\n\n{link_line}\n' + ''.join(entries)
          with open('readme.txt', 'w') as f:
              f.write(before + new_cl + '\n' + after)
          PYEOF

      # ── 13. Regenerate screenshot with updated version ────────────────────
      - name: Regenerate screenshot
        if: steps.compare.outputs.changed == 'true'
        env:
          AWS_SDK_VERSION: ${{ steps.latest.outputs.version }}
          AWS_SDK_RELEASE_DATE: ${{ steps.release_date.outputs.date }}
        run: |
          pip install --quiet pillow
          python3 scripts/generate_screenshot.py

      # ── 15. Commit and push directly to main ─────────────────────────────
      - name: Commit and push to main
        if: steps.compare.outputs.changed == 'true'
        id: commit
        env:
          NEW_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add composer.json composer.lock vendor/ full-aws-sdk.php readme.txt CHANGELOG.md .wordpress-org/screenshot-1.png
          git commit -m "Update AWS SDK for PHP to ${NEW_VERSION}

          Automated update triggered by the daily version check workflow.
          SDK release date: ${{ steps.release_date.outputs.date }}"

          # Tag the commit with the new version number
          git tag "${NEW_VERSION}" -m "AWS SDK for WordPress ${NEW_VERSION}"

          # Push the commit and the tag together
          git push origin main
          git push origin "${NEW_VERSION}"

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # ── 16. Create a published GitHub Release (latest) ────────────────────
      - name: Create GitHub Release
        if: steps.compare.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.latest.outputs.version }}
          name: AWS SDK for WordPress ${{ steps.latest.outputs.version }}
          body: |
            Bundles **AWS SDK for PHP ${{ steps.latest.outputs.version }}** (released ${{ steps.release_date.outputs.date }}).

            ### Installation
            Download `full-aws-sdk.zip` below and install via **Plugins → Add New → Upload Plugin** in WordPress.

            ### Changes in this SDK version
            See the [AWS SDK for PHP changelog](https://github.com/aws/aws-sdk-php/blob/master/CHANGELOG.md) for the full list of changes.
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
